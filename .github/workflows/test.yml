name: Tests

on: [push, pull_request]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test Python compilation
      run: |
        python -m py_compile civ_estimator.py salvage_estimator.py item_factory.py test_factory_integration.py

    - name: Run CIV estimator
      run: python3 civ_estimator.py > /dev/null

    - name: Run Salvage estimator
      run: python3 salvage_estimator.py > /dev/null

    - name: Run Item factory
      run: python3 item_factory.py > /dev/null

    - name: Run Integration test
      run: python3 test_factory_integration.py > /dev/null

  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.20', '1.21']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build all Go packages
      run: go build -v -o InventoryPlanningControl ./...

    - name: Run main binary
      run: ./InventoryPlanningControl > /dev/null

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Check Python syntax
      run: |
        python -m py_compile *.py
